<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MQTT 广播客户端</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 40px 20px;
        color: #333;
      }

      .container {
        width: 100%;
        max-width: 960px;
      }

      header {
        text-align: center;
        margin-bottom: 30px;
      }

      header h1 {
        margin: 0 0 8px;
        font-size: 32px;
        color: #fff;
        text-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
      }

      header p {
        margin: 0;
        color: rgba(255, 255, 255, 0.85);
        font-size: 15px;
      }

      .status-bar {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        background: rgba(255, 255, 255, 0.95);
        padding: 10px 22px;
        border-radius: 50px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
        font-weight: 500;
        margin-bottom: 24px;
      }

      .status-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #dc3545;
        transition: background 0.3s;
      }

      .status-dot.online {
        background: #28a745;
        box-shadow: 0 0 8px #28a745;
      }
      .status-dot.offline {
        background: #dc3545;
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 24px;
      }

      @media (max-width: 720px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }

      .card {
        background: rgba(255, 255, 255, 0.96);
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        display: flex;
        flex-direction: column;
      }

      .card h2 {
        margin: 0 0 18px;
        font-size: 18px;
        color: #444;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .control-panel {
        align-items: stretch;
      }

      .control-panel p {
        margin: 0 0 16px;
        color: #666;
        font-size: 14px;
        line-height: 1.6;
      }

      button {
        padding: 16px 28px;
        font-size: 17px;
        font-weight: 600;
        color: #fff;
        background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
        border: none;
        border-radius: 12px;
        cursor: pointer;
        box-shadow: 0 6px 16px rgba(0, 123, 255, 0.35);
        transition:
          transform 0.12s,
          box-shadow 0.12s;
      }

      button:hover:not(:disabled) {
        box-shadow: 0 8px 20px rgba(0, 123, 255, 0.45);
      }

      button:active:not(:disabled) {
        transform: scale(0.96);
        box-shadow: 0 3px 10px rgba(0, 123, 255, 0.35);
      }

      button:disabled {
        background: #adb5bd;
        cursor: not-allowed;
        box-shadow: none;
      }

      button.secondary {
        padding: 10px 18px;
        font-size: 14px;
        background: linear-gradient(135deg, #6c757d 0%, #495057 100%);
        box-shadow: 0 4px 12px rgba(108, 117, 125, 0.3);
      }
      button.secondary:hover:not(:disabled) {
        box-shadow: 0 6px 16px rgba(108, 117, 125, 0.4);
      }

      .broadcast-btn {
        margin-bottom: 18px;
      }

      .log-panel {
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      #log {
        flex: 1;
        min-height: 180px;
        max-height: 260px;
        overflow-y: auto;
        background: #f8f9fa;
        padding: 12px;
        border-radius: 10px;
        font-size: 13px;
        line-height: 1.5;
        color: #555;
      }

      .log-item {
        margin: 4px 0;
        padding: 6px 8px;
        background: #fff;
        border-radius: 6px;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
      }

      .device-list {
        flex: 1;
        min-height: 180px;
        max-height: 320px;
        overflow-y: auto;
      }

      .device-empty {
        text-align: center;
        color: #999;
        padding: 40px 0;
        font-size: 14px;
      }

      .device-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 14px;
        margin-bottom: 10px;
        background: #f8f9fa;
        border-radius: 10px;
        border-left: 4px solid #28a745;
      }

      .device-info {
        display: flex;
        flex-direction: column;
        gap: 4px;
        overflow: hidden;
      }

      .device-id {
        font-weight: 600;
        color: #333;
        word-break: break-all;
      }

      .device-time {
        font-size: 12px;
        color: #888;
      }

      .device-badge {
        flex-shrink: 0;
        padding: 4px 10px;
        background: #28a745;
        color: #fff;
        border-radius: 50px;
        font-size: 12px;
        font-weight: 500;
      }

      footer {
        margin-top: 30px;
        color: rgba(255, 255, 255, 0.7);
        font-size: 13px;
      }

      /* Agent list styles */
      .agent-list {
        flex: 1;
        min-height: 180px;
        max-height: 320px;
        overflow-y: auto;
      }

      .agent-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 14px;
        margin-bottom: 10px;
        background: #f8f9fa;
        border-radius: 10px;
        border-left: 4px solid #adb5bd;
        transition: border-color 0.3s, background 0.3s;
      }

      .agent-item.working {
        border-left-color: #007bff;
        background: #e8f4ff;
      }
      .agent-item.idle {
        border-left-color: #28a745;
      }
      .agent-item.offline {
        border-left-color: #dc3545;
      }
      .agent-item.active {
        background: #fff;
        box-shadow: 0 2px 8px rgba(0, 123, 255, 0.12);
      }

      .agent-info {
        display: flex;
        flex-direction: column;
        gap: 3px;
        overflow: hidden;
      }

      .agent-name {
        font-weight: 600;
        color: #333;
      }

      .agent-meta {
        font-size: 12px;
        color: #888;
      }

      .agent-status {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
      }

      .agent-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #adb5bd;
      }
      .agent-dot.idle {
        background: #28a745;
        box-shadow: 0 0 6px #28a745;
      }
      .agent-dot.working {
        background: #007bff;
        box-shadow: 0 0 6px #007bff;
        animation: pulse 1s infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
      }

      .agent-label {
        font-size: 12px;
        font-weight: 500;
        padding: 3px 8px;
        border-radius: 50px;
      }
      .agent-label.working {
        background: #cce5ff;
        color: #004085;
      }
      .agent-label.idle {
        background: #d4edda;
        color: #155724;
      }
      .agent-label.offline {
        background: #f8d7da;
        color: #721c24;
      }

      /* Switch */
      .switch {
        position: relative;
        display: inline-block;
        width: 44px;
        height: 24px;
        flex-shrink: 0;
      }
      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }
      .slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: #ccc;
        transition: 0.3s;
        border-radius: 24px;
      }
      .slider:before {
        position: absolute;
        content: "";
        height: 18px;
        width: 18px;
        left: 3px;
        bottom: 3px;
        background-color: white;
        transition: 0.3s;
        border-radius: 50%;
      }
      .switch input:checked + .slider {
        background-color: #28a745;
      }
      .switch input:checked + .slider:before {
        transform: translateX(20px);
      }

      .led-state {
        margin-top: 12px;
        padding: 10px 14px;
        background: #f8f9fa;
        border-radius: 10px;
        font-size: 13px;
        color: #666;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .led-dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: #28a745;
      }
      .led-dot.blinking {
        background: #007bff;
        animation: pulse 1s infinite;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>MQTT 广播控制台</h1>
        <p>通过 Multica CLI 监控 agent 状态，实时驱动 ESP32 LED</p>
      </header>

      <div style="text-align: center">
        <div class="status-bar">
          <span id="statusDot" class="status-dot offline"></span>
          <span id="status">未连接</span>
        </div>
      </div>

      <div class="grid">
        <section class="card control-panel">
          <h2>🤖 Agent 状态监控</h2>
          <p>
            数据来自 <code>multica agent list</code> 和 <code>multica runtime list</code>。
            选择一个 agent 作为监听目标：<strong>working</strong> 时 LED 持续闪烁，<strong>idle</strong> 时 LED 常亮。
          </p>

          <div id="agentList" class="agent-list">
            <div class="device-empty">正在加载 agent 列表...</div>
          </div>

          <div id="ledState" class="led-state">
            <span id="ledDot" class="led-dot"></span>
            <span id="ledLabel">LED: 未监听</span>
          </div>

          <h2 style="margin-top: 18px">📡 广播控制</h2>
          <p>
            点击下方按钮向主题 <strong>device/broadcast</strong> 发送广播消息，所有订阅该主题的设备都会收到。
          </p>
          <button id="broadcastBtn" class="broadcast-btn" disabled>
            发送广播
          </button>

          <h2 style="margin-top: 18px">📝 消息日志</h2>
          <div id="log"></div>
        </section>

        <section class="card">
          <h2>💻 已连接设备</h2>
          <div id="deviceList" class="device-list">
            <div class="device-empty">暂无在线设备</div>
          </div>
        </section>
      </div>

      <footer>MQTT Broker: <span id="brokerInfo">-</span></footer>
    </div>

    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script>
      const statusEl = document.getElementById("status");
      const statusDot = document.getElementById("statusDot");
      const btn = document.getElementById("broadcastBtn");
      const logEl = document.getElementById("log");
      const deviceListEl = document.getElementById("deviceList");
      const brokerInfoEl = document.getElementById("brokerInfo");
      const agentListEl = document.getElementById("agentList");
      const ledDot = document.getElementById("ledDot");
      const ledLabel = document.getElementById("ledLabel");

      const topic = "device/broadcast";
      const onlineTopic = "device/online";
      const cliTopic = "device/cli";
      const agentTopic = "device/agent";
      const brokerUrl = "ws://" + window.location.hostname + ":8080";

      let agentCache = [];

      function addLog(msg) {
        const div = document.createElement("div");
        div.className = "log-item";
        div.textContent = new Date().toLocaleTimeString() + " " + msg;
        logEl.prepend(div);
        while (logEl.children.length > 100) {
          logEl.removeChild(logEl.lastChild);
        }
      }

      function formatDuration(ms) {
        const s = Math.floor(ms / 1000);
        if (s < 60) return s + " 秒";
        const m = Math.floor(s / 60);
        if (m < 60) return m + " 分钟";
        const h = Math.floor(m / 60);
        return h + " 小时 " + (m % 60) + " 分钟";
      }

      function formatTime(ts) {
        if (!ts) return "从未";
        const d = new Date(ts);
        return isNaN(d.getTime()) ? "未知" : d.toLocaleTimeString();
      }

      function renderDevices(devices) {
        deviceListEl.innerHTML = "";
        if (!devices || devices.length === 0) {
          deviceListEl.innerHTML =
            '<div class="device-empty">暂无在线设备</div>';
          return;
        }
        const now = Date.now();
        devices.forEach((device) => {
          const item = document.createElement("div");
          item.className = "device-item";
          const connectedAt = new Date(device.connectedAt).toLocaleString();
          const duration = formatDuration(now - device.connectedAt);
          item.innerHTML = `
            <div class="device-info">
              <span class="device-id">${device.id}</span>
              <span class="device-time">上线：${connectedAt} · 已在线 ${duration}</span>
            </div>
            <span class="device-badge">在线</span>
          `;
          deviceListEl.appendChild(item);
        });
      }

      function statusClass(status) {
        if (status === "working") return "working";
        if (status === "idle") return "idle";
        if (status === "online") return "idle";
        return "offline";
      }

      function statusLabel(status) {
        if (status === "working") return "进行中";
        if (status === "idle") return "在线";
        if (status === "online") return "在线";
        return "离线";
      }

      function mergeAgents(list) {
        if (!Array.isArray(list)) return;
        list.forEach((incoming) => {
          const idx = agentCache.findIndex((a) => a.name === incoming.name);
          if (idx >= 0) {
            agentCache[idx] = { ...agentCache[idx], ...incoming };
          } else {
            agentCache.push(incoming);
          }
        });
        const names = new Set(list.map((a) => a.name));
        agentCache = agentCache.filter((a) => names.has(a.name));
      }

      function updateLEDState() {
        const active = agentCache.find((a) => a.active);
        if (!active) {
          ledDot.className = "led-dot";
          ledLabel.textContent = "LED: 未监听";
          return;
        }
        const status = active.status;
        if (status === "working") {
          ledDot.className = "led-dot blinking";
          ledLabel.textContent = "LED: 闪烁（" + active.name + " 进行中）";
        } else {
          ledDot.className = "led-dot";
          ledLabel.textContent = "LED: 常亮（" + active.name + " " + statusLabel(status) + "）";
        }
      }

      function renderAgents(agents) {
        if (agents) mergeAgents(agents);

        agentListEl.innerHTML = "";
        if (agentCache.length === 0) {
          agentListEl.innerHTML =
            '<div class="device-empty">暂无 agent（请确保已安装 multica CLI 并登录）</div>';
          updateLEDState();
          return;
        }

        agentCache.forEach((agent) => {
          const cls = statusClass(agent.status);
          const isActive = agent.active;
          const runtimeInfo = agent.provider
            ? agent.provider + (agent.version ? " · " + agent.version : "")
            : agent.runtimeMode || "";
          const lastSeen = agent.lastSeen
            ? "检测: " + formatTime(agent.lastSeen)
            : "";

          const item = document.createElement("div");
          item.className = `agent-item ${cls} ${isActive ? "active" : ""}`;
          item.innerHTML = `
            <div class="agent-info">
              <span class="agent-name">${agent.name}</span>
              <span class="agent-meta">${runtimeInfo} · ${statusLabel(agent.status)} · ${lastSeen}</span>
            </div>
            <div class="agent-status">
              <span class="agent-dot ${cls}"></span>
              <span class="agent-label ${cls}">${statusLabel(agent.status)}</span>
              <label class="switch" title="启动监听">
                <input type="checkbox" data-name="${agent.name}" ${isActive ? "checked" : ""} />
                <span class="slider"></span>
              </label>
            </div>
          `;
          agentListEl.appendChild(item);
        });

        agentListEl.querySelectorAll('.agent-status input[type="checkbox"]').forEach((cb) => {
          cb.addEventListener("change", () => setActiveAgent(cb.dataset.name, cb.checked));
        });

        updateLEDState();
      }

      async function setActiveAgent(name, checked) {
        agentCache.forEach((a) => {
          a.active = a.name === name && checked;
        });
        renderAgents();

        const target = checked ? name : "";
        try {
          const url = checked
            ? "/api/agents/active"
            : "/api/agents/active";
          const method = checked ? "POST" : "DELETE";
          const body = checked ? JSON.stringify({ name: target }) : null;
          const res = await fetch(url, {
            method,
            headers: body ? { "Content-Type": "application/json" } : {},
            body,
          });
          const data = await res.json();
          if (data.ok) {
            renderAgents(data.list);
            if (target) {
              addLog("已启动监听 agent: " + target);
            } else {
              addLog("已关闭 agent 监听");
            }
          } else {
            addLog("切换监听失败");
          }
        } catch (e) {
          addLog("切换监听失败: " + e.message);
        }
      }

      async function loadAgents() {
        try {
          const res = await fetch("/api/agents");
          const list = await res.json();
          renderAgents(list);
        } catch (e) {
          addLog("加载 agent 列表失败: " + e.message);
        }
      }

      brokerInfoEl.textContent = brokerUrl;

      const client = mqtt.connect(brokerUrl, {
        reconnectPeriod: 3000,
        connectTimeout: 10 * 1000,
      });

      client.on("connect", () => {
        statusEl.textContent = "已连接";
        statusDot.className = "status-dot online";
        btn.disabled = false;
        addLog("已连接 MQTT 服务器");

        [topic, onlineTopic, cliTopic, agentTopic].forEach((t) => {
          client.subscribe(t, (err) => {
            if (err) {
              addLog("订阅失败 [" + t + "]: " + err.message);
            } else {
              addLog("已订阅主题: " + t);
            }
          });
        });

        loadAgents();
      });

      client.on("message", (t, payload) => {
        const text = payload.toString();
        if (t === onlineTopic) {
          try {
            const devices = JSON.parse(text);
            renderDevices(devices);
          } catch (e) {
            addLog("设备列表解析失败");
          }
        } else if (t === agentTopic) {
          try {
            const agents = JSON.parse(text);
            renderAgents(agents);
          } catch (e) {
            addLog("Agent 列表解析失败");
          }
        } else if (t === cliTopic) {
          addLog("LED 命令: " + text);
        } else {
          addLog("收到 [" + t + "]: " + text);
        }
      });

      client.on("error", (err) => {
        statusEl.textContent = "连接错误";
        statusDot.className = "status-dot offline";
        addLog("错误: " + err.message);
      });

      client.on("close", () => {
        statusEl.textContent = "连接已断开";
        statusDot.className = "status-dot offline";
        btn.disabled = true;
        addLog("连接断开");
      });

      client.on("reconnect", () => {
        addLog("正在重新连接 MQTT...");
      });

      btn.addEventListener("click", () => {
        const msg = "broadcast_" + Date.now();
        client.publish(topic, msg, (err) => {
          if (err) {
            addLog("发送失败: " + err.message);
          } else {
            addLog("已发送广播: " + msg);
          }
        });
      });

      // Polling fallback to keep the UI fresh
      setInterval(() => {
        if (client.connected) {
          loadAgents();
        }
      }, 5000);
    </script>
  </body>
</html>
